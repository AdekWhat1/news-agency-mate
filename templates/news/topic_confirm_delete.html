{% extends "base.html" %}

{% block title %}Delete Topic - News Agency{% endblock %}
{% block header_title %}Delete Category{% endblock %}

{% block content %}
<div class="container-fluid px-0 mb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 text-center">
            <div class="card bg-white rounded-4 shadow-sm border p-5">
                <i class="fas fa-trash-alt text-danger display-3 mb-4"></i>
                <h3 class="fw-bold text-dark mb-3">Delete Topic</h3>
                <p class="text-muted mb-4">
                    Do you really want to delete the category <strong class="text-dark">"{{ topic.name }}"</strong>?
                </p>

                <form action="" method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{% url 'news:topic-list' %}" class="btn btn-outline-secondary px-4 text-uppercase fw-bold">
                            Cancel
                        </a>
                        <button type="submit" class="btn btn-danger px-4 text-uppercase fw-bold">
                            Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
